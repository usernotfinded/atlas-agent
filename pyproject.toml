[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "atlas-agent"
version = "0.1.0"
description = "Atlas Agent connects top financial LLMs, market research, broker execution, persistent memory, and risk-gated autonomous trading routines."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Atlas Agent Contributors" }]

[project.scripts]
atlas = "atlas_agent.cli:main"
omni-trade = "atlas_agent.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.data-files]
"share/atlas-agent/templates/routine-trader" = [
  "templates/routine-trader/.env.example",
  "templates/routine-trader/.gitignore",
  "templates/routine-trader/README.md",
]
"share/atlas-agent/templates/routine-trader/memory" = [
  "templates/routine-trader/memory/*.md",
]
"share/atlas-agent/templates/routine-trader/routines" = [
  "templates/routine-trader/routines/README.md",
]
"share/atlas-agent/templates/routine-trader/routines/prompts" = [
  "templates/routine-trader/routines/prompts/*.md",
]
"share/atlas-agent/templates/routine-trader/routines/schedules" = [
  "templates/routine-trader/routines/schedules/*",
]
"share/atlas-agent/templates/routine-trader/skills" = [
  "templates/routine-trader/skills/*.md",
]
"share/atlas-agent/templates/routine-trader/reports/daily" = [
  "templates/routine-trader/reports/daily/.gitkeep",
]
"share/atlas-agent/templates/routine-trader/reports/weekly" = [
  "templates/routine-trader/reports/weekly/.gitkeep",
]
"share/atlas-agent/templates/routine-trader/pending_orders" = [
  "templates/routine-trader/pending_orders/.gitkeep",
]
"share/atlas-agent/templates/routine-trader/audit" = [
  "templates/routine-trader/audit/.gitkeep",
]
"share/atlas-agent/templates/routine-trader/configs" = [
  "templates/routine-trader/configs/brokers.example.yaml",
  "templates/routine-trader/configs/market.example.yaml",
  "templates/routine-trader/configs/providers.example.yaml",
  "templates/routine-trader/configs/risk.example.yaml",
  "templates/routine-trader/configs/scheduler.example.yaml",
  "templates/routine-trader/configs/strategy.example.yaml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
