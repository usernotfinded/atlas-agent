brokers:
  default: paper
  paper:
    enabled: true
  alpaca:
    enabled: false
    key_env: ALPACA_API_KEY
    secret_env: ALPACA_SECRET_KEY
  binance:
    enabled: false
    key_env: BINANCE_API_KEY
    secret_env: BINANCE_API_SECRET
    spot_only: true
  ccxt:
    enabled: false
  ibkr:
    enabled: false
    status: stub_only

# Live-submit opt-in (global broker-level)
broker:
  enable_live_trading: false
  enable_live_submit: false   # NEW: separate opt-in for actual order placement
