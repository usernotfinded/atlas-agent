vals_finance_agent:
  url: "https://www.vals.ai/benchmarks/finance_agent"
  top_n: 7
  fallback_cache: true

# User-editable mappings from benchmark display names to configured provider IDs.
# Some model IDs are placeholders because public API IDs can differ by account,
# region, release channel, or OpenAI-compatible gateway. Verify before live use.
model_mappings:
  "Claude Opus 4.7":
    provider: "anthropic"
    env_key: "ANTHROPIC_API_KEY"
    model_id: "claude-opus-4-7"
    notes: "Placeholder; verify Anthropic model ID before use."
