name: Bug Report
description: Report a reproducible defect in Atlas Agent.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        > **Do not paste secrets, API keys, broker credentials, provider credentials, account IDs, private financial details, or personal data in this form.**

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Atlas Agent are you running?
      placeholder: "e.g., 0.5.7rc5"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      placeholder: "e.g., macOS 14, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      description: What Python version are you using?
      placeholder: "e.g., 3.11.9"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command Run
      description: What command did you run?
      placeholder: |
        atlas validate
        atlas backtest run --data data/sample/ohlcv.csv --symbol DEMO-SYMBOL
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Output
      description: |
        Paste relevant logs or output. **Remove any secrets, credentials, or absolute paths before posting.**
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: safety
    attributes:
      label: Safety Checklist
      description: Confirm the following before submitting.
      options:
        - label: I did not include secrets, API keys, broker credentials, or personal financial data.
          required: true
        - label: I removed absolute paths from any output pasted above.
          required: true
