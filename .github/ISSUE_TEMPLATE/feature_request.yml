name: Feature Request
description: Suggest a new capability or improvement for Atlas Agent.
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        > **Do not paste secrets, API keys, broker credentials, provider credentials, account IDs, private financial details, or personal data in this form.**
        >
        > The following are out of scope for feature requests:
        > - Requests to bypass risk gates
        > - Requests for profit guarantees
        > - Requests to enable real-money trading without review
        > - Requests for broker credential examples

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How do you imagine this working?
    validations:
      required: false

  - type: checkboxes
    id: boundaries
    attributes:
      label: Safety Boundaries
      description: Confirm the following.
      options:
        - label: This feature does not request bypassing risk gates or approval workflows.
          required: true
        - label: This feature does not request enabling live trading without review.
          required: true
        - label: This feature does not request profit guarantees or trading performance claims.
          required: true
