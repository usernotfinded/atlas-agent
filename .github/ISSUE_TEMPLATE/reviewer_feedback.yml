name: Reviewer Feedback
description: Structured feedback from external reviewers and new users.
title: "[Feedback] "
labels: [feedback, review]
body:
  - type: markdown
    attributes:
      value: |
        > **Not financial advice.** Atlas Agent is a software tool, not a financial advisor. Trading involves significant risk of loss.
        >
        > **Do not paste secrets, API keys, broker credentials, provider credentials, account IDs, private financial details, or personal data in this form.**
        >
        > **Out of scope:** requests to bypass safety gates, enable live trading by default, evaluate profit/trading signals, or set up real-money broker accounts.

  - type: input
    id: environment
    attributes:
      label: Reviewer Environment
      description: How are you running Atlas Agent?
      placeholder: "e.g., macOS 14, Ubuntu 22.04, GitHub Codespaces"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      description: What Python version are you using?
      placeholder: "e.g., 3.11.9"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install Method
      description: How did you install Atlas Agent?
      options:
        - pip install -e .
        - pip install .
        - uv pip install -e .
        - poetry install
        - other
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feedback Category
      description: What area does your feedback relate to?
      options:
        - install
        - docs
        - CLI UX
        - safety model
        - research workflow
        - test / release gate
        - bug
        - other technical feedback
    validations:
      required: true

  - type: checkboxes
    id: smoke_checks
    attributes:
      label: Pre-Feedback Checks
      description: Which checks did you run before opening this feedback?
      options:
        - label: "`python3.11 scripts/smoke_reviewer_golden_path.py` passed"
          required: false
        - label: "`python3.11 scripts/build_release_evidence_bundle.py --skip-slow` passed"
          required: false
        - label: "`python3.11 scripts/check_cli_command_compatibility.py` passed"
          required: false

  - type: textarea
    id: command
    attributes:
      label: Command Run (if applicable)
      description: What command did you run?
      placeholder: |
        atlas validate
        atlas backtest run --data data/sample/ohlcv.csv --symbol DEMO-SYMBOL
      render: shell
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Output
      description: |
        Paste relevant logs or output. **Remove any secrets, credentials, or absolute paths before posting.**
      render: shell
    validations:
      required: false

  - type: dropdown
    id: protected_boundary
    attributes:
      label: Protected Boundary Involvement
      description: Does this feedback involve config, brokers, execution, safety, or risk boundaries?
      options:
        - "no"
        - config
        - brokers
        - execution
        - safety
        - risk
        - unsure
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Safety Checklist
      description: Confirm the following before submitting.
      options:
        - label: I did not include secrets, API keys, broker credentials, or personal financial data.
          required: true
        - label: I removed absolute paths from any output pasted above.
          required: true
        - label: I did not request live trading enablement, safety bypass, profit evaluation, or real-money broker setup.
          required: true
