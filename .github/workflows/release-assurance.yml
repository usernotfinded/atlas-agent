name: Release Assurance

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release tag to verify"
        required: true
        default: "v0.6.11"
      include_reviewer_trust_snapshot:
        description: "Include a reviewer trust snapshot in the assurance output"
        type: boolean
        required: false
        default: false
      run_bundle_demo:
        description: "Run the release assurance bundle end-to-end demo and upload its artifacts"
        type: boolean
        required: false
        default: false
      bundle_demo_version:
        description: "Release tag to use for the bundle demo (default: current public release)"
        type: string
        required: false
        default: "v0.6.11"
      upload_diagnostics_json:
        description: "Upload a redacted release-assurance diagnostics JSON artifact on failure"
        type: boolean
        required: false
        default: false
      validate_diagnostics_artifact:
        description: "Validate the diagnostics JSON before uploading it"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  release-assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ENABLE_LIVE_TRADING: "false"
      PROVIDER_EXECUTION_ENABLED: "false"
      BROKER_EXECUTION_ENABLED: "false"
      RELEASE_TAG: "${{ inputs.release }}"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run static release checks
        run: |
          python scripts/check_release_metadata.py

          python scripts/check_version_consistency.py
          python scripts/check_forbidden_claims.py
          ./scripts/release_check.sh --quick

      - name: Generate release assurance pack
        id: release_assurance
        shell: bash
        env:
          INCLUDE_REVIEWER_TRUST_SNAPSHOT: ${{ inputs.include_reviewer_trust_snapshot }}
          UPLOAD_DIAGNOSTICS_JSON: ${{ inputs.upload_diagnostics_json }}
        run: |
          mkdir -p artifacts/release_assurance_diagnostics
          flags=()
          if [[ "${INCLUDE_REVIEWER_TRUST_SNAPSHOT}" == "true" ]]; then
            flags+=(--include-reviewer-trust-snapshot)
          fi
          if [[ "${UPLOAD_DIAGNOSTICS_JSON}" == "true" ]]; then
            flags+=(--diagnostics-json artifacts/release_assurance_diagnostics/release-assurance-diagnostics.json)
          fi
          set +e
          python scripts/release_assurance.py \
            --version "${RELEASE_TAG}" \
            --output "artifacts/release_assurance/${RELEASE_TAG}-ci" \
            "${flags[@]}"
          exit_code=$?
          set -e
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          if [[ "${exit_code}" -ne 0 ]]; then
            echo "::warning::Release assurance pack generation failed (exit ${exit_code})."
          fi
          exit 0

      - name: Upload release assurance artifact
        if: steps.release_assurance.outputs.exit_code == '0'
        uses: actions/upload-artifact@v6
        with:
          name: release-assurance-${{ inputs.release }}
          path: artifacts/release_assurance/${{ inputs.release }}-ci
          if-no-files-found: error
          retention-days: 14

      - name: Validate release assurance diagnostics artifact
        if: >-
          inputs.upload_diagnostics_json &&
          inputs.validate_diagnostics_artifact &&
          steps.release_assurance.outputs.exit_code != '0'
        run: |
          python3.11 scripts/check_release_assurance_diagnostics_artifact.py \
            artifacts/release_assurance_diagnostics/release-assurance-diagnostics.json

      - name: Upload release assurance diagnostics artifact
        if: inputs.upload_diagnostics_json && steps.release_assurance.outputs.exit_code != '0'
        uses: actions/upload-artifact@v6
        with:
          name: release-assurance-diagnostics
          path: artifacts/release_assurance_diagnostics/release-assurance-diagnostics.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Run release assurance bundle demo
        if: inputs.run_bundle_demo && steps.release_assurance.outputs.exit_code == '0'
        env:
          BUNDLE_DEMO_VERSION: ${{ inputs.bundle_demo_version }}
        run: |
          mkdir -p artifacts/release_assurance_bundle_demo
          bash scripts/demo_release_assurance_snapshot_bundle.sh \
            --version "${BUNDLE_DEMO_VERSION}" \
            --output-dir "artifacts/release_assurance_bundle_demo/${BUNDLE_DEMO_VERSION}" \
            --deterministic

      - name: Validate release assurance bundle manifest
        if: inputs.run_bundle_demo && steps.release_assurance.outputs.exit_code == '0'
        env:
          BUNDLE_DEMO_VERSION: ${{ inputs.bundle_demo_version }}
        run: |
          python scripts/check_release_assurance_bundle_manifest.py \
            "artifacts/release_assurance_bundle_demo/${BUNDLE_DEMO_VERSION}"

      - name: Upload release assurance bundle demo artifact
        if: inputs.run_bundle_demo && steps.release_assurance.outputs.exit_code == '0'
        uses: actions/upload-artifact@v6
        with:
          name: release-assurance-bundle-demo
          path: artifacts/release_assurance_bundle_demo/${{ inputs.bundle_demo_version }}
          if-no-files-found: error
          retention-days: 14

      - name: Fail if release assurance failed
        if: steps.release_assurance.outputs.exit_code != '0'
        env:
          RA_EXIT_CODE: ${{ steps.release_assurance.outputs.exit_code }}
        run: |
          exit_code="${RA_EXIT_CODE}"
          echo "Release assurance failed with exit code ${exit_code}"
          exit "${exit_code:-1}"
