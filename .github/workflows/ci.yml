name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TRADING_MODE: paper
      ENABLE_LIVE_TRADING: "false"
      ALLOW_GIT_COMMIT: "false"
      ALLOW_GIT_PUSH: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - run: python -m pytest
      - run: atlas --help
      - run: atlas init demo-workspace --template routine-trader
      - run: atlas validate
        working-directory: demo-workspace
      - run: atlas routine run pre_market --mode paper
        working-directory: demo-workspace
      - run: atlas routine run market_open --mode paper
        working-directory: demo-workspace
