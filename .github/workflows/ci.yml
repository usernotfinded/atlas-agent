name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_BIN: python3.11
  PYTHONUNBUFFERED: "1"
  ATLAS_CI: "1"

jobs:
  full-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install -e .
          python3.11 -m pip install pytest
      - name: Version consistency
        run: python3.11 scripts/check_version_consistency.py
      - name: Forbidden claims scan
        run: python3.11 scripts/check_forbidden_claims.py
      - name: pytest
        run: python3.11 -m pytest -q
      - name: pip check
        run: python3.11 -m pip check
      - name: Demo paper workflow
        run: ./scripts/demo_paper_workflow.sh
      - name: Demo research workflow
        run: ./scripts/demo_research_workflow.sh
      - name: git diff --check
        run: git diff --check
      - name: Protected staged files check
        run: python3.11 scripts/check_no_protected_staged.py
