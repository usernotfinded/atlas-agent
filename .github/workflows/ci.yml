name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_BIN: python3.11
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTEST_ADDOPTS: "-p no:cacheprovider"
  ATLAS_CI: "1"
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  quick-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Fetch release tags
        run: git fetch --force --tags origin
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and dev dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install -e '.[dev]'
      - name: Version consistency
        run: python3.11 scripts/check_version_consistency.py
      - name: Release metadata
        run: python3.11 scripts/check_release_metadata.py
      - name: CLI command compatibility
        run: python3.11 scripts/check_cli_command_compatibility.py
      - name: Forbidden claims scan
        run: python3.11 scripts/check_forbidden_claims.py
      - name: Feedback intake check
        run: python3.11 scripts/check_feedback_intake.py
      - name: Feedback taxonomy check
        run: python3.11 scripts/check_feedback_taxonomy.py
      - name: Reviewer outreach check
        run: python3.11 scripts/check_reviewer_outreach.py
      - name: Product capability inventory check
        run: python3.11 scripts/check_product_capability_inventory.py
      - name: v0.6.11 post-release check
        run: python3.11 scripts/check_v0611_release_prep.py --post-release
      - name: v0.6.12 release candidate readiness check
        run: python3.11 scripts/check_v0612_release_candidate_readiness.py
      - name: v0.6.12 release candidate readiness tests
        run: python3.11 -m pytest tests/test_v0612_release_candidate_readiness.py -q
      - name: Public docs consistency
        run: python3.11 scripts/check_public_docs_consistency.py
      - name: Product demo and marketplace readiness check
        run: python3.11 scripts/check_product_demo_pack.py
      - name: Product demo evidence tests (fast)
        run: python3.11 -m pytest tests/test_product_demo_evidence.py -m "not slow" -q
      - name: Reviewer trust snapshot check (self-test)
        run: python3.11 scripts/check_reviewer_trust_snapshot.py --self-test
      - name: Reviewer trust snapshot tests (fast)
        run: python3.11 -m pytest tests/test_reviewer_trust_snapshot.py -q
      - name: Reviewer trust snapshot workflow check
        run: python3.11 scripts/check_reviewer_trust_snapshot_workflow.py
      - name: Reviewer trust snapshot workflow tests (fast)
        run: python3.11 -m pytest tests/test_reviewer_trust_snapshot_workflow.py -q
      - name: Docs archive hygiene check
        run: python3.11 scripts/check_docs_archive_hygiene.py
      - name: Docs archive hygiene tests (fast)
        run: python3.11 -m pytest tests/test_docs_archive_hygiene.py -q
      - name: Release assurance snapshot integration check
        run: python3.11 scripts/check_release_assurance_snapshot_integration.py
      - name: Release assurance snapshot integration tests (fast)
        run: python3.11 -m pytest tests/test_release_assurance_snapshot_integration.py -q
      - name: Release assurance bundle manifest tests (fast)
        run: python3.11 -m pytest tests/test_release_assurance_bundle_manifest.py -m "not slow" -q
      - name: Release assurance bundle workflow check
        run: python3.11 scripts/check_release_assurance_bundle_workflow.py
      - name: Release assurance bundle workflow tests (fast)
        run: python3.11 -m pytest tests/test_release_assurance_bundle_workflow.py -q
      - name: Release assurance diagnostics check
        run: python3.11 scripts/check_release_assurance_diagnostics.py
      - name: Release assurance diagnostics tests
        run: python3.11 -m pytest tests/test_release_assurance_diagnostics.py -q
      - name: Release assurance diagnostics workflow check
        run: python3.11 scripts/check_release_assurance_diagnostics_workflow.py
      - name: Release assurance diagnostics workflow tests
        run: python3.11 -m pytest tests/test_release_assurance_diagnostics_workflow.py -q
      - name: Release assurance diagnostics artifact check (deterministic fixture)
        run: |
          python3.11 - <<'PY'
          import json, subprocess, sys, tempfile
          from pathlib import Path

          repo_root = Path.cwd()
          check_script = repo_root / "scripts" / "check_release_assurance_diagnostics_artifact.py"

          with tempfile.TemporaryDirectory() as tmp:
              diag_path = Path(tmp) / "release-assurance-diagnostics.json"
              diag_path.write_text(
                  json.dumps(
                      {
                          "schema_version": "atlas-release-assurance-diagnostics/1.0",
                          "passed": False,
                          "release": "v0.0.0-does-not-exist",
                          "failed_phase": "release_assurance",
                          "failed_check": "package_version_aligned",
                          "command": "internal: read pyproject.toml",
                          "exit_code": 0,
                          "stdout_excerpt": "",
                          "stderr_excerpt": "",
                          "remediation": "Verify versions are aligned.",
                          "redactions_applied": ["*_TOKEN"],
                      },
                      indent=2,
                      sort_keys=True,
                  ) + "\n",
                  encoding="utf-8",
              )
              subprocess.run([
                  sys.executable, str(check_script), str(diag_path),
                  "--expect-release", "v0.0.0-does-not-exist",
                  "--expect-failed-check", "package_version_aligned",
              ], check=True)
          PY
      - name: Release assurance diagnostics artifact tests
        run: python3.11 -m pytest tests/test_release_assurance_diagnostics_artifact.py -q
      - name: Release assurance diagnostics artifact workflow check
        run: python3.11 scripts/check_release_assurance_diagnostics_artifact_workflow.py
      - name: Release assurance diagnostics artifact workflow tests
        run: python3.11 -m pytest tests/test_release_assurance_diagnostics_artifact_workflow.py -q
      - name: Run release assurance artifact retention audit check
        run: python3.11 scripts/check_release_assurance_artifact_retention_audit.py
      - name: Run release assurance artifact retention audit (deterministic fixture)
        run: |
          python3.11 - <<'PY'
          import json, subprocess, sys, tempfile
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          repo_root = Path.cwd()
          audit_script = repo_root / "scripts" / "audit_release_assurance_artifact_retention.py"

          with tempfile.TemporaryDirectory() as tmp:
              fixture_path = Path(tmp) / "artifacts.json"
              report_dir = Path(tmp) / "report"
              report_dir.mkdir()
              now = datetime.now(timezone.utc)
              fixture_path.write_text(
                  json.dumps(
                      {
                          "total_count": 1,
                          "artifacts": [
                              {
                                  "name": "release-assurance-diagnostics",
                                  "id": 123456,
                                  "workflow_run": {"id": 789012},
                                  "created_at": (now - timedelta(days=10)).strftime("%Y-%m-%dT%H:%M:%SZ"),
                                  "expires_at": (now + timedelta(days=3)).strftime("%Y-%m-%dT%H:%M:%SZ"),
                                  "expired": False,
                              }
                          ],
                      },
                      indent=2,
                      sort_keys=True,
                  ) + "\n",
                  encoding="utf-8",
              )
              subprocess.run([
                  sys.executable, str(audit_script),
                  "--input-json", str(fixture_path),
                  "--output-dir", str(report_dir),
                  "--json",
              ], check=True)
              json_report = report_dir / "release-assurance-artifact-retention-report.json"
              md_report = report_dir / "release-assurance-artifact-retention-report.md"
              assert json_report.exists(), f"JSON report not found: {json_report}"
              assert md_report.exists(), f"Markdown report not found: {md_report}"
          PY
      - name: Run release assurance artifact retention audit tests
        run: python3.11 -m pytest tests/test_release_assurance_artifact_retention_audit.py -q
      - name: Release assurance workflow artifact check (deterministic fixture)
        run: |
          python3.11 - <<'PY'
          import json, subprocess, sys, tempfile
          from pathlib import Path

          release = "v0.6.11"
          repo_root = Path.cwd()
          build_script = repo_root / "scripts" / "build_release_assurance_bundle_manifest.py"
          check_script = repo_root / "scripts" / "check_release_assurance_workflow_artifact.py"

          with tempfile.TemporaryDirectory() as tmp:
              artifact_dir = Path(tmp) / "release-assurance-bundle-demo"
              baseline_dir = artifact_dir / "baseline"
              snapshot_dir = artifact_dir / "with-reviewer-trust-snapshot"
              baseline_dir.mkdir(parents=True)
              snapshot_dir.mkdir(parents=True)
              for bundle in (baseline_dir, snapshot_dir):
                  for name in ("release-assurance-summary.json", "release-assurance-report.md", "sha256sums.txt"):
                      (bundle / name).write_text("{}", encoding="utf-8")
              snap_dir = snapshot_dir / "reviewer-trust-snapshot"
              snap_dir.mkdir()
              (snap_dir / "reviewer-trust-snapshot.json").write_text(
                  json.dumps({"schema_version": "atlas-reviewer-trust-snapshot/1.0"}, indent=2),
                  encoding="utf-8",
              )
              (snap_dir / "reviewer-trust-snapshot.md").write_text("# Reviewer trust snapshot\n", encoding="utf-8")

              subprocess.run([
                  sys.executable, str(build_script),
                  "--baseline-dir", str(baseline_dir),
                  "--snapshot-dir", str(snapshot_dir),
                  "--release", release,
                  "--output-dir", str(artifact_dir),
              ], check=True)

              subprocess.run([
                  sys.executable, str(check_script), str(artifact_dir),
              ], check=True)
          PY
      - name: Release assurance workflow artifact tests (fast)
        run: python3.11 -m pytest tests/test_release_assurance_workflow_artifact.py -q
      - name: Trust center check
        run: python3.11 scripts/check_trust_center.py
      - name: Onboarding docs check
        run: python3.11 scripts/check_onboarding_docs.py
      - name: Generated artifact hygiene check
        run: python3.11 scripts/check_generated_artifacts.py
      - name: GitHub Actions version check
        run: python3.11 scripts/check_github_actions_versions.py
      - name: README quickstart verification
        run: python3.11 scripts/verify_readme_quickstart.py
      - name: RC cutover check
        run: python3.11 scripts/check_rc1_cutover.py
      - name: Clean install dry-run
        run: python3.11 scripts/check_clean_install.py --dry-run
      - name: Clean install verification
        run: python3.11 scripts/check_clean_install.py --allow-network
      - name: Package distribution dry-run
        run: python3.11 scripts/check_package_distribution.py --dry-run
      - name: Package distribution verification
        run: python3.11 scripts/check_package_distribution.py
      - name: Public launch readiness check
        run: python3.11 scripts/check_public_launch_readiness.py
      - name: Reviewer onboarding check
        run: python3.11 scripts/check_reviewer_onboarding.py
      - name: Public launch messaging check
        run: python3.11 scripts/check_public_launch_messaging.py
      - name: Final RC audit check
        run: python3.11 scripts/check_final_rc_audit.py
      - name: Stable release decision check
        run: python3.11 scripts/check_stable_release_decision.py
      - name: Focused pytest subset
        run: |
          python3.11 -m pytest \
            tests/test_clean_install_check.py \
            tests/test_package_distribution_check.py \
            tests/test_rc1_cutover_consistency.py \
            tests/test_changelog_consistency.py \
            tests/test_public_docs_consistency.py \
            tests/test_generated_artifacts.py \
            tests/test_github_actions_versions.py \
            tests/test_trust_center.py \
            tests/test_onboarding_docs.py \
            tests/test_readme_quickstart_verification.py \
            tests/test_release_check_scripts.py \
            tests/test_ci_workflows.py \
            tests/test_docs_v040.py \
            tests/test_public_launch_readiness.py \
            tests/test_reviewer_onboarding.py \
            tests/test_public_launch_messaging.py \
            tests/test_final_rc_audit.py \
            tests/test_stable_release_decision.py \
            tests/test_check_v0611_release_prep.py \
            tests/test_check_v0611_planning.py \
            tests/test_product_demo_pack.py \
            tests/test_reviewer_trust_snapshot_workflow.py \
            tests/test_docs_archive_hygiene.py \
            tests/test_release_assurance_snapshot_integration.py \
            -q
      - name: Release check quick
        run: ./scripts/release_check.sh --quick
      - name: pip check
        run: python3.11 -m pip check
      - name: git diff --check
        run: git diff --check
      - name: Protected staged files check
        run: python3.11 scripts/check_no_protected_staged.py

  core-functional:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Fetch release tags
        run: git fetch --force --tags origin
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and dev dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install -e '.[dev]'
      - name: Run core-functional test suite
        run: |
          python3.11 -m pytest tests/ -q \
            --ignore=tests/test_demo_research_workflow_script.py \
            --ignore=tests/test_changelog_consistency.py \
            --ignore=tests/test_docs_v040.py \
            --ignore=tests/test_feedback_intake.py \
            --ignore=tests/test_feedback_taxonomy.py \
            --ignore=tests/test_final_rc_audit.py \
            --ignore=tests/test_live_submit_safety_contract_docs.py \
            --ignore=tests/test_product_capability_inventory.py \
            --ignore=tests/test_provider_policy_docs.py \
            --ignore=tests/test_provider_safety_dossier_docs.py \
            --ignore=tests/test_public_docs_consistency.py \
            --ignore=tests/test_public_launch_messaging.py \
            --ignore=tests/test_public_launch_readiness.py \
            --ignore=tests/test_rc1_cutover_consistency.py \
            --ignore=tests/test_release_candidate_audit_docs.py \
            --ignore=tests/test_release_candidate_cutover_docs.py \
            --ignore=tests/test_release_check_scripts.py \
            --ignore=tests/test_release_evidence_bundle.py \
            --ignore=tests/test_research_workflow_docs.py \
            --ignore=tests/test_research_workflow_reference_docs.py \
            --ignore=tests/test_reviewer_golden_path_smoke.py \
            --ignore=tests/test_reviewer_onboarding.py \
            --ignore=tests/test_reviewer_outreach.py \
            --ignore=tests/test_smoke_package_build_script.py \
            --ignore=tests/test_smoke_release_tag_script.py \
            --ignore=tests/test_stable_release_decision.py \
            --ignore=tests/test_v0581_hotfix_cutover.py \
            --ignore=tests/test_v058_dev_version_regression.py \
            --ignore=tests/test_v058_rc1_cutover.py \
            --ignore=tests/test_v058_rc1_readiness.py \
            --ignore=tests/test_v058_rc2_cutover.py \
            --ignore=tests/test_v058_rc3_cutover.py \
            --ignore=tests/test_v058_rc4_cutover.py \
            --ignore=tests/test_v058_rc5_cutover.py \
            --ignore=tests/test_v058_stable_cutover.py \
            --ignore=tests/research/test_release_candidate_cutover_dry_run.py \
            --ignore=tests/research/test_release_candidate_readiness.py \
            --ignore=tests/research/test_research_schema_version.py
